name: 同步两个私有仓库内容

on:
  schedule:
    - cron: '0 22 * * 1-5' 
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync-repositories:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出 Pages 仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
    
    - name: 克隆第一个私有仓库 rss
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git clone --depth 1 https://x-access-token:${PAT_TOKEN}@github.com/uu5zn/rss.git /tmp/repo1
    
    - name: 克隆第二个私有仓库 analyse
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git clone --depth 1 https://x-access-token:${PAT_TOKEN}@github.com/uu5zn/analyse.git /tmp/repo2
    
    - name: 同步 rss/README.md 到 Pages 根目录
      run: |
        cp /tmp/repo1/5day_report.md ./5day_report.md
        cp /tmp/repo1/today_report.md ./today_report.md
    
    - name: 同步 analyse/output 到 Pages/output 目录（仅SVG图片）
      run: |
        mkdir -p ./output
        cp -r /tmp/repo2/output/*.svg ./output/ 2>/dev/null || true
        cp -r /tmp/repo2/output/*.json ./output/ 2>/dev/null || true
        cp -r /tmp/repo2/output/*.md ./output/ 2>/dev/null || true
    
    - name: 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 安装依赖并预渲染页面
      run: |
        npm install
        npm run prerender
    
    - name: 更新 Sitemap 最后修改日期
      run: |
        TODAY=$(date +%Y-%m-%d)
        sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
        echo "Sitemap lastmod 已更新至 ${TODAY}"
    
    - name: 检测文件变更
      id: check-changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          git status --porcelain > changes.txt
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: 提交并推送变更
      if: steps.check-changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "chore: 同步私有仓库更新" -m "$(cat changes.txt)"
        git push origin main
    
    - name: 清理临时目录
      if: always()
      run: rm -rf /tmp/repo1 /tmp/repo2
